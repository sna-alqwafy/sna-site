<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - سنا القوافي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}

/* عنوان */
h1 {
  color: gold;
  margin-top: 30px;
}

/* فورم */
.form {
  margin: 30px;
}

input, textarea {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

textarea {
  height: 150px;
}

/* زر */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: gold;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* تنبيه */
.success {
  margin-top: 20px;
  color: lightgreen;
}
</style>
</head>

<body>

<h1>إضافة قصيدة ✍️</h1>

<div class="form">
<input type="text" id="poet" placeholder="اسم الشاعر">
<textarea id="text" placeholder="نص القصيدة (كل بيت سطر)"></textarea>
<br>
<button onclick="addPoem()">إضافة</button>

<div class="success" id="msg"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrBy85P281ovyBFqp7xOKI-5RGCKPUQ6c",
  authDomain: "sna-alqwady.firebaseapp.com",
  projectId: "sna-alqwady",
  storageBucket: "sna-alqwady.firebasestorage.app",
  messagingSenderId: "909724079580",
  appId: "1:909724079580:web:f09170e928f1ae97c96b19",
  measurementId: "G-CVYG6GMZEQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addPoem = async function() {
  const poet = document.getElementById("poet").value;
  const text = document.getElementById("text").value;

  if (!poet || !text) {
    alert("عبي البيانات");
    return;
  }

  await addDoc(collection(db, "poems"), {
    poet: poet,
    text: text
  });

  document.getElementById("msg").innerText = "تمت الإضافة بنجاح ✅";

  document.getElementById("poet").value = "";
  document.getElementById("text").value = "";
}
</script>

</body>
</html>
